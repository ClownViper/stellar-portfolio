<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLAR ARCHIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;800&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --space: #060915;
    --space-2: #0a0f22;
    --panel: rgba(13, 18, 38, 0.72);
    --panel-solid: #0d1226;
    --line: #1e2748;
    --starlight: #eef3ff;
    --aurora: #7dd9e8;
    --aurora-soft: rgba(125, 217, 232, 0.35);
    --muted: #8b94b8;
    --muted-dim: #4e5678;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--space);
    color: var(--starlight);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== Sky layers ===== */
  #sky {
    position: fixed; inset: 0; z-index: -3;
    background:
      radial-gradient(ellipse 120% 80% at 50% 120%, #101a3a 0%, transparent 55%),
      radial-gradient(ellipse 80% 55% at 20% -10%, rgba(70, 90, 160, 0.18), transparent 60%),
      var(--space);
  }
  #aurora {
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background:
      radial-gradient(ellipse 45% 26% at 75% 8%, rgba(125,217,232,0.10), transparent 70%),
      radial-gradient(ellipse 50% 22% at 30% 4%, rgba(150,120,220,0.08), transparent 70%);
    animation: auroraShift 18s ease-in-out infinite alternate;
  }
  @keyframes auroraShift {
    from { opacity: 0.7; transform: translateX(-2%); }
    to   { opacity: 1;   transform: translateX(2%); }
  }
  #starfield { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

  .mono { font-family: 'Space Mono', monospace; }
  .display { font-family: 'Shippori Mincho', serif; }

  /* ===== Observatory top bar ===== */
  .topbar {
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(10,15,34,0.85), rgba(10,15,34,0.35));
    backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 30;
  }
  .obs-id { display: flex; align-items: center; gap: 14px; }
  .obs-id .mark {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--aurora);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .obs-id .mark::before {
    content: ''; position: absolute; inset: -5px; border-radius: 50%;
    border: 1px dashed rgba(125,217,232,0.3);
    animation: slowSpin 24s linear infinite;
  }
  @keyframes slowSpin { to { transform: rotate(360deg); } }
  .obs-id .mark span { font-family: 'Shippori Mincho', serif; font-weight: 800; font-size: 17px; color: var(--aurora); }
  .obs-id .name { font-family: 'Shippori Mincho', serif; font-size: 19px; font-weight: 600; letter-spacing: 0.14em; line-height: 1.2; }
  .obs-id .sub { font-family: 'Space Mono', monospace; font-size: 9.5px; color: var(--muted); letter-spacing: 0.12em; }

  .obs-meta { display: flex; gap: 26px; }
  .obs-meta .item { text-align: right; }
  .obs-meta .k { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted-dim); letter-spacing: 0.16em; }
  .obs-meta .v { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--aurora); margin-top: 2px; }
  @media (max-width: 680px) { .obs-meta .hide-sm { display: none; } }

  /* ===== Hero ===== */
  .hero { text-align: center; padding: 64px 20px 22px; position: relative; }
  .hero .eyebrow {
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.5em;
    color: var(--aurora); text-transform: uppercase; padding-left: 0.5em;
  }
  .hero h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(40px, 8vw, 84px);
    font-weight: 800;
    letter-spacing: 0.16em;
    padding-left: 0.16em;
    margin-top: 14px;
    line-height: 1.1;
    text-shadow: 0 0 50px rgba(125,217,232,0.25);
  }
  .hero .en {
    font-family: 'Space Mono', monospace; font-size: 11.5px; color: var(--muted);
    letter-spacing: 0.35em; margin-top: 12px; text-transform: uppercase; padding-left: 0.35em;
  }
  .hero p.sub {
    color: var(--muted); font-size: 13.5px; line-height: 2; margin-top: 22px;
    max-width: 520px; margin-left: auto; margin-right: auto;
  }

  /* ===== Star chart ===== */
  .chart-wrap {
    max-width: 1100px; margin: 30px auto 0; padding: 0 16px;
    position: relative;
  }
  .chart-frame {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel);
    backdrop-filter: blur(3px);
    position: relative;
    overflow: hidden;
  }
  .chart-frame .frame-label {
    position: absolute; top: 12px; left: 16px; z-index: 5;
    font-family: 'Space Mono', monospace; font-size: 9.5px; color: var(--muted-dim); letter-spacing: 0.18em;
  }
  .chart-frame .frame-label-r {
    position: absolute; top: 12px; right: 16px; z-index: 5;
    font-family: 'Space Mono', monospace; font-size: 9.5px; color: var(--muted-dim); letter-spacing: 0.12em;
  }
  #starchart { display: block; width: 100%; height: auto; }

  #starchart .const-hit { cursor: pointer; }
  #starchart .const-line {
    fill: none;
    stroke-width: 1;
    stroke-linecap: round;
    opacity: 0.28;
    transition: opacity 0.4s ease, stroke-width 0.4s ease;
  }
  #starchart .const-group.active .const-line {
    opacity: 0.95;
    stroke-width: 1.4;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLine 1.4s ease forwards;
  }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }

  #starchart .const-star { transition: r 0.3s ease, opacity 0.3s ease; opacity: 0.75; }
  #starchart .const-group.active .const-star { opacity: 1; }
  #starchart .const-group.active .star-halo { animation: haloPulse 2.4s ease-in-out infinite; }
  @keyframes haloPulse { 0%,100% { opacity: 0.25; } 50% { opacity: 0.6; } }

  #starchart .const-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px; letter-spacing: 0.24em;
    fill: var(--muted); opacity: 0.85;
    transition: fill 0.3s ease;
  }
  #starchart .const-name-en {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 0.18em;
    fill: var(--muted-dim);
  }
  #starchart .const-group.active .const-name { fill: var(--starlight); }
  #starchart .const-group:hover .const-name { fill: var(--starlight); }

  #starchart .graticule { stroke: rgba(125,217,232,0.06); fill: none; }

  /* ===== Constellation nav ===== */
  .const-nav {
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin-top: 18px;
  }
  .const-nav button {
    --c: var(--aurora);
    font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 12.5px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 18px; cursor: pointer;
    transition: all 0.25s ease;
    display: flex; align-items: center; gap: 8px;
  }
  .const-nav button .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c); box-shadow: 0 0 8px var(--c); }
  .const-nav button:hover { color: var(--starlight); border-color: var(--muted-dim); }
  .const-nav button.active {
    color: var(--starlight);
    border-color: var(--c);
    box-shadow: 0 0 16px -6px var(--c);
  }
  .const-nav button:focus-visible { outline: 2px solid var(--aurora); outline-offset: 2px; }

  /* ===== Observation console ===== */
  .console-wrap { max-width: 1100px; margin: 26px auto 0; padding: 0 16px 40px; }
  .console {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel);
    backdrop-filter: blur(3px);
    padding: 34px 36px;
    display: grid; grid-template-columns: 230px 1fr; gap: 36px;
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 720px) { .console { grid-template-columns: 1fr; padding: 26px 22px; } }
  .console::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--obj-c, var(--aurora)), transparent);
    opacity: 0.8;
  }
  .console .console-tag {
    position: absolute; top: 14px; right: 20px;
    font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted-dim); letter-spacing: 0.16em;
  }

  .orbit-view { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .orbit {
    position: relative; width: 170px; height: 170px; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .orbit .ring1, .orbit .ring2 { position: absolute; border-radius: 50%; }
  .orbit .ring1 {
    inset: 0;
    border: 1px solid color-mix(in srgb, var(--obj-c, var(--aurora)) 25%, transparent);
    animation: slowSpin 30s linear infinite;
  }
  .orbit .ring1::after {
    content: ''; position: absolute; top: -3px; left: 50%; width: 6px; height: 6px; border-radius: 50%;
    background: var(--obj-c, var(--aurora)); box-shadow: 0 0 10px var(--obj-c, var(--aurora));
  }
  .orbit .ring2 {
    inset: 20px;
    border: 1px dashed color-mix(in srgb, var(--obj-c, var(--aurora)) 20%, transparent);
    animation: slowSpin 18s linear infinite reverse;
  }
  .orbit .body {
    width: 92px; height: 92px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    background:
      radial-gradient(circle at 32% 28%, color-mix(in srgb, var(--obj-c, var(--aurora)) 55%, transparent), transparent 60%),
      radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5), transparent 55%),
      var(--space-2);
    border: 1px solid color-mix(in srgb, var(--obj-c, var(--aurora)) 60%, transparent);
    box-shadow: 0 0 40px -8px var(--obj-c, var(--aurora)), inset -8px -8px 24px rgba(0,0,0,0.55);
  }
  .orbit-view .obj-class {
    font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.2em;
    color: var(--obj-c, var(--aurora));
    border: 1px solid color-mix(in srgb, var(--obj-c, var(--aurora)) 50%, transparent);
    border-radius: 999px; padding: 4px 14px; text-transform: uppercase;
  }
  .orbit-view .obj-code { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted-dim); margin-top: 10px; letter-spacing: 0.14em; }

  .obj-main .oname {
    font-family: 'Shippori Mincho', serif; font-size: 34px; font-weight: 600;
    letter-spacing: 0.08em; line-height: 1.2;
    color: var(--starlight);
  }
  .obj-main .oname .accent { color: var(--obj-c, var(--aurora)); }
  .obj-main .otag { color: var(--muted); font-size: 13px; margin-top: 8px; margin-bottom: 20px; line-height: 1.8; }

  .sec {
    font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.22em;
    color: var(--muted-dim); text-transform: uppercase;
    margin: 20px 0 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .sec::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }
  .sec:first-child { margin-top: 0; }

  .obslog { list-style: none; }
  .obslog li {
    font-size: 13.5px; line-height: 1.9;
    padding: 5px 0 5px 24px; position: relative;
    color: #cdd5ef;
  }
  .obslog li::before {
    content: '✦'; position: absolute; left: 2px; top: 5px;
    color: var(--obj-c, var(--aurora)); font-size: 11px;
  }

  .mag-row { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }
  .mag-row .mlabel { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); width: 96px; flex-shrink: 0; letter-spacing: 0.06em; }
  .mag-row .mtrack { flex: 1; height: 2px; background: var(--line); position: relative; border-radius: 2px; }
  .mag-row .mfill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    background: var(--obj-c, var(--aurora));
    border-radius: 2px;
    transition: width 0.9s cubic-bezier(.2,.8,.2,1);
  }
  .mag-row .mfill::after {
    content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--obj-c, var(--aurora));
    box-shadow: 0 0 10px var(--obj-c, var(--aurora));
  }
  .mag-row .mval { font-family: 'Space Mono', monospace; font-size: 11px; width: 34px; text-align: right; color: var(--muted); }

  .spectra { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
  .spectra span {
    font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 12px;
    border: 1px solid var(--line); border-radius: 999px; color: var(--muted);
    background: rgba(125,217,232,0.03);
  }

  .obj-links { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .obj-links a, .obj-links span.disabled {
    font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 12.5px;
    padding: 10px 24px; border-radius: 999px;
    border: 1px solid var(--obj-c, var(--aurora));
    color: var(--obj-c, var(--aurora)); text-decoration: none;
    transition: all 0.25s ease;
  }
  .obj-links a:hover {
    background: var(--obj-c, var(--aurora)); color: var(--space);
    box-shadow: 0 0 24px -6px var(--obj-c, var(--aurora));
  }
  .obj-links span.disabled { color: var(--muted-dim); border-color: var(--line); }

  .hint {
    text-align: center; font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted-dim); margin-top: 16px; letter-spacing: 0.1em;
  }

  /* ===== Footer ===== */
  footer {
    border-top: 1px solid var(--line);
    padding: 30px 20px 38px; text-align: center;
    background: linear-gradient(180deg, transparent, rgba(10,15,34,0.7));
  }
  footer .flinks { display: flex; justify-content: center; gap: 26px; margin-bottom: 16px; flex-wrap: wrap; }
  footer .flinks a {
    color: var(--muted); text-decoration: none;
    font-family: 'Space Mono', monospace; font-size: 11.5px; letter-spacing: 0.08em;
    border-bottom: 1px dotted var(--muted-dim); padding-bottom: 2px;
  }
  footer .flinks a:hover { color: var(--aurora); border-color: var(--aurora); }
  footer .copy { color: var(--muted-dim); font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; line-height: 1.9; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div id="sky"></div>
<div id="aurora"></div>
<canvas id="starfield"></canvas>

<div class="topbar">
  <div class="obs-id">
    <div class="mark"><span id="t-mark"></span></div>
    <div>
      <div class="name display" id="t-name"></div>
      <div class="sub" id="t-sub"></div>
    </div>
  </div>
  <div class="obs-meta" id="t-meta"></div>
</div>

<div class="hero">
  <div class="eyebrow mono" id="h-eyebrow"></div>
  <h1 class="display" id="h-title"></h1>
  <div class="en" id="h-title-en"></div>
  <p class="sub" id="h-sub"></p>
</div>

<div class="chart-wrap">
  <div class="chart-frame">
    <div class="frame-label mono" id="c-frame-label"></div>
    <div class="frame-label-r mono" id="coord-readout">RA --h --m / DEC +--°</div>
    <svg id="starchart" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="制作物の星図">
      <g id="graticule"></g>
      <g id="constellations"></g>
    </svg>
  </div>

  <div class="const-nav" id="const-nav"></div>
  <p class="hint" id="c-hint"></p>
</div>

<div class="console-wrap">
  <div class="console" id="console"></div>
</div>

<footer>
  <div class="flinks" id="f-links"></div>
  <div class="copy" id="f-copy"></div>
</footer>

<script src="content.js"></script>
<script>
/* =====================================================================
   以下は描画ロジック。文言の変更では触る必要はありません。
   (Railsでいう view/helper 相当。文言は content.js = locales で管理)
   ===================================================================== */

/* ===== Apply SITE content ===== */
document.title = SITE.pageTitle;
document.getElementById('t-mark').textContent = SITE.topbar.mark;
document.getElementById('t-name').textContent = SITE.topbar.name;
document.getElementById('t-sub').textContent = SITE.topbar.sub;
document.getElementById('t-meta').innerHTML = SITE.topbar.meta.map(m => `
  <div class="item ${m.hideSm ? 'hide-sm' : ''}">
    <div class="k">${m.k}</div>
    <div class="v" ${m.v === 'CLOCK' ? 'id="obs-clock"' : ''}>${m.v === 'CLOCK' ? '--:--:--' : m.v}</div>
  </div>
`).join('');

document.getElementById('h-eyebrow').textContent = SITE.hero.eyebrow;
document.getElementById('h-title').textContent = SITE.hero.title;
document.getElementById('h-title-en').textContent = SITE.hero.titleEn;
document.getElementById('h-sub').innerHTML = SITE.hero.sub;

document.getElementById('c-frame-label').textContent = SITE.chart.frameLabel;
document.getElementById('c-hint').textContent = SITE.chart.hint;

document.getElementById('f-links').innerHTML = SITE.footer.links.map(l =>
  `<a href="${l.href}" target="_blank" rel="noopener">${l.label}</a>`
).join('');
document.getElementById('f-copy').innerHTML = SITE.footer.copy;

/* ===== Starfield canvas ===== */
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let bgStars = [];
let meteors = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  bgStars = Array.from({ length: Math.min(220, Math.floor(canvas.width * canvas.height / 8000)) }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.3 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: 0.4 + Math.random() * 1.2
  }));
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnMeteor() {
  meteors.push({
    x: Math.random() * canvas.width * 0.8 + canvas.width * 0.1,
    y: Math.random() * canvas.height * 0.3,
    vx: -(4 + Math.random() * 3),
    vy: 2 + Math.random() * 2,
    life: 1
  });
}

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function drawSky(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of bgStars) {
    const tw = reduceMotion ? 0.8 : 0.55 + 0.45 * Math.sin(t / 900 * s.speed + s.phase);
    ctx.globalAlpha = tw * 0.9;
    ctx.fillStyle = '#dfe8ff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (!reduceMotion) {
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.vx * 10, m.y - m.vy * 10);
      grad.addColorStop(0, `rgba(200,225,255,${0.85 * m.life})`);
      grad.addColorStop(1, 'rgba(200,225,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - m.vx * 10, m.y - m.vy * 10);
      ctx.stroke();
      m.x += m.vx; m.y += m.vy; m.life -= 0.02;
      if (m.life <= 0) meteors.splice(i, 1);
    }
    if (Math.random() < 0.004) spawnMeteor();
  }
  requestAnimationFrame(drawSky);
}
requestAnimationFrame(drawSky);

/* ===== Clock (only if a CLOCK meta exists) ===== */
const clockEl = document.getElementById('obs-clock');
if (clockEl) {
  function tickClock() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    clockEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  tickClock();
  setInterval(tickClock, 1000);
}

/* ===== Graticule ===== */
const grat = document.getElementById('graticule');
let gratHtml = '';
for (let x = 100; x < 1000; x += 100) {
  gratHtml += `<path class="graticule" d="M ${x} 0 Q ${x + 12} 260 ${x} 520" />`;
}
for (let y = 90; y < 520; y += 90) {
  gratHtml += `<path class="graticule" d="M 0 ${y} Q 500 ${y - 14} 1000 ${y}" />`;
}
grat.innerHTML = gratHtml;

/* ===== Constellations ===== */
const constG = document.getElementById('constellations');
constG.innerHTML = PROJECTS.map((p, i) => {
  const starsSvg = p.stars.map(([x, y, r]) => `
    <circle class="star-halo" cx="${x}" cy="${y}" r="${r * 2.6}" fill="${p.color}" opacity="0.22"/>
    <circle class="const-star" cx="${x}" cy="${y}" r="${r}" fill="#f4f7ff"/>
    <circle cx="${x}" cy="${y}" r="${r * 0.45}" fill="${p.color}"/>
  `).join('');
  const linesSvg = p.edges.map(([a, b]) => {
    const [x1, y1] = p.stars[a]; const [x2, y2] = p.stars[b];
    return `<line class="const-line" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${p.color}"/>`;
  }).join('');
  const xs = p.stars.map(s => s[0]), ys = p.stars.map(s => s[1]);
  const bx = Math.min(...xs) - 30, by = Math.min(...ys) - 30;
  const bw = Math.max(...xs) - bx + 60, bh = Math.max(...ys) - by + 60;

  return `
    <g class="const-group" data-index="${i}">
      ${linesSvg}
      ${starsSvg}
      <text class="const-name" x="${p.label[0]}" y="${p.label[1]}" text-anchor="middle">${p.constLabel}</text>
      <text class="const-name-en" x="${p.label[0]}" y="${p.label[1] + 16}" text-anchor="middle">${p.nameEn}</text>
      <rect class="const-hit" x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="transparent">
        <title>${p.name}</title>
      </rect>
    </g>
  `;
}).join('');

/* ===== Nav buttons ===== */
const nav = document.getElementById('const-nav');
nav.innerHTML = PROJECTS.map((p, i) => `
  <button style="--c:${p.color}" data-index="${i}">
    <span class="dot"></span>${p.constLabel} — ${p.name}
  </button>
`).join('');

/* ===== Console ===== */
const consoleEl = document.getElementById('console');
const coordReadout = document.getElementById('coord-readout');
let activeIndex = 0;

function renderConsole() {
  const p = PROJECTS[activeIndex];
  consoleEl.style.setProperty('--obj-c', p.color);

  const linksHtml = p.links.map(l =>
    l.disabled
      ? `<span class="disabled">${l.label}</span>`
      : `<a href="${l.href}" target="_blank" rel="noopener">${l.label}</a>`
  ).join('');

  consoleEl.innerHTML = `
    <div class="console-tag mono">${SITE.console.tagPrefix} ${p.code}</div>
    <div class="orbit-view">
      <div class="orbit">
        <div class="ring1"></div>
        <div class="ring2"></div>
        <div class="body">${p.icon}</div>
      </div>
      <div class="obj-class">${p.objClass}</div>
      <div class="obj-code">${p.nameEn}</div>
    </div>
    <div class="obj-main">
      <div class="oname display">${p.constLabel}<span class="accent"> / </span>${p.name}</div>
      <div class="otag">${p.tag}</div>

      <div class="sec">${SITE.console.secLog}</div>
      <ul class="obslog">
        ${p.log.map(m => `<li>${m}</li>`).join('')}
      </ul>

      <div class="sec">${SITE.console.secMag}</div>
      ${p.mags.map(([label, val]) => `
        <div class="mag-row">
          <div class="mlabel">${label}</div>
          <div class="mtrack"><div class="mfill" data-val="${val}"></div></div>
          <div class="mval">${val}</div>
        </div>
      `).join('')}

      <div class="sec">${SITE.console.secSpectra}</div>
      <div class="spectra">${p.spectra.map(t => `<span>${t}</span>`).join('')}</div>

      <div class="obj-links">${linksHtml}</div>
    </div>
  `;

  requestAnimationFrame(() => {
    consoleEl.querySelectorAll('.mfill').forEach(el => {
      el.style.width = el.dataset.val + '%';
    });
  });

  const [lx, ly] = p.label;
  const ra = Math.round(lx / 1000 * 24);
  const dec = Math.round(60 - ly / 520 * 90);
  coordReadout.textContent = `RA ${String(ra).padStart(2, '0')}h ${String(Math.round(lx % 60)).padStart(2, '0')}m / DEC ${dec >= 0 ? '+' : ''}${dec}°`;
}

function updateActive() {
  document.querySelectorAll('.const-group').forEach((g, i) => {
    g.classList.toggle('active', i === activeIndex);
  });
  nav.querySelectorAll('button').forEach((b, i) => {
    b.classList.toggle('active', i === activeIndex);
  });
  renderConsole();
}

function selectIndex(i) {
  if (i < 0) i = PROJECTS.length - 1;
  if (i >= PROJECTS.length) i = 0;
  if (i !== activeIndex) {
    activeIndex = i;
    updateActive();
  }
}

constG.querySelectorAll('.const-group').forEach(g => {
  g.addEventListener('click', () => selectIndex(parseInt(g.dataset.index, 10)));
});
nav.querySelectorAll('button').forEach(b => {
  b.addEventListener('click', () => selectIndex(parseInt(b.dataset.index, 10)));
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') selectIndex(activeIndex + 1);
  if (e.key === 'ArrowLeft') selectIndex(activeIndex - 1);
});

updateActive();
</script>

</body>
</html>
