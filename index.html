<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congratulations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', system-ui, sans-serif;
      color: #5c5346;
      background: linear-gradient(160deg, #f7f4ed 0%, #efe9dd 55%, #e3e7dc 100%);
      overflow-x: hidden;
    }

    .section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 1.6;
      font-weight: 700;
      color: #7a8a6a;
    }

    p {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      line-height: 2.1;
      max-width: 32rem;
      font-weight: 500;
    }

    .emoji { font-size: clamp(2.5rem, 10vw, 4rem); margin-bottom: 1.5rem; }

    .scroll-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #a89f8e;
      animation: bounce 2s infinite;
      transition: opacity 0.5s ease;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }
  </style>
</head>
<body>

  <section class="section">
    <div class="reveal">
      <div class="emoji">🌿</div>
      <h1>ご結婚<br>おめでとう</h1>
    </div>
  </section>

  <section class="section">
    <p class="reveal">
      ふたりが出会えたことも<br>
      今日この日を迎えられたことも<br>
      きっと特別なご縁ですね。
    </p>
  </section>

  <section class="section">
    <p class="reveal">
      これからの毎日が<br>
      笑顔のあふれる<br>
      あたたかなものになりますように。
    </p>
  </section>

  <section class="section">
    <div class="reveal">
      <div class="emoji">🤍</div>
      <h1>末永く<br>お幸せに</h1>
    </div>
  </section>

  <div class="scroll-hint">▼ スクロール</div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.4 });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

    const lastSection = document.querySelector('.section:last-of-type .reveal');
    let celebrated = false;
    const finale = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting && !celebrated) {
          celebrated = true;
          launchConfetti();
        }
      });
    }, { threshold: 0.6 });
    finale.observe(lastSection);

    window.addEventListener('load', () => {
      setTimeout(() => {
        confetti({
          particleCount: 80,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#a8b894', '#d4c9a8', '#e8e2d5', '#bcae8e']
        });
      }, 800);
    });

    window.addEventListener('scroll', () => {
      const hint = document.querySelector('.scroll-hint');
      if (window.scrollY > 100) hint.style.opacity = '0';
    }, { passive: true });

    function launchConfetti() {
      const end = Date.now() + 1500;
      const colors = ['#a8b894', '#d4c9a8', '#e8e2d5', '#bcae8e'];
      (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }
  </script>

</body>
</html>
